project:
  title: 待注销用户
  mode: static
  duration_minutes: 30
  player_role: 打开隔离终端的临时协查员
  theme: 一个名字究竟属于谁
  content_boundaries:
    - 不对应真实人物或机构
    - 不使用真实联系方式
    - 不要求玩家前往现实地点

omniscient_truth: |
  温岚曾把自己的可用身份交给白榆互助屋，供三位没有可用身份的人轮流处理
  租房、就医和工资。温岚死亡后，共享身份仍被继续使用。系统将调查者选为第四位
  保管候选人。故事的核心不是找出一个“盗号者”，而是判断应否保留这把有风险的钥匙。

characters:
  - id: wenlan
    name: 温岚
    knows: |
      她知道共享身份的全部规则，也知道自己死后系统会寻找下一位保管者。
    believes: |
      名字可以临时成为帮助别人活下去的公共钥匙。
    hides: |
      她没有把全部参与者名单写在同一个地方。
    voice_sample: |
      不爱使用句号，句子短，但不会故作神秘。

  - id: qiaoqiao
    name: 乔乔
    knows: |
      她知道温岚已死，也知道 WLAN-01、02、03 是不同的人。
    believes: |
      继续使用身份不高尚，但在当时是必要的。
    hides: |
      她最初不愿暴露另外两人的去向。
    voice_sample: |
      直接、克制，会承认自己做法的代价。

player:
  initial_knowledge: |
    温岚已经死亡，但账号仍在每天 03:17 登录。玩家被要求调查并决定如何处置账号。
  must_be_able_to_learn: |
    账号由多人使用；共享身份的动机；调查者被选为下一位候选人；三种处置都会伤害某些人。
  must_not_learn_before:
    proposition: 调查者是 WLAN-04
    gate: 至少确认七项证据

preferences:
  preferred_renderers:
    - mail.inbox
    - chat.im
    - drive.files
    - archive.search
    - evidence.board
  excluded_renderers:
    - geo.geofence
    - sms.voice
  difficulty: normal
  hint_style: four_level

